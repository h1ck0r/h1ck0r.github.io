  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '网盾网络安全学院',
      repo: ''
    }
  </script>
  <!-- Docsify v4 -->

<script>

    loadSidebar: true,
    subMaxLevel: 2,

    onlyCover: false,


    search: {
        paths: 'auto',
        placeholder: '搜索',
        noData: '找不到结果',

      },
    
    alias: {
      '/.*/_sidebar.md': '/_sidebar.md'
    }

  }
</script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
